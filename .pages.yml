media:
  input: public/uploads
  output: /uploads
content:
  - name: announcements
    label: Announcements
    type: collection
    path: content/announcements
    fields:
      - name: title
        label: Title
        type: string
      - name: body
        label: Content
        type: rich-text
      - name: speaker
        label: Speaker
        type: string
      - name: place
        label: Place
        type: string
      - name: image
        label: Image
        type: image
      - name: date
        label: Date
        type: date